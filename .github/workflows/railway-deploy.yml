name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Railway up (deploy current commit)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set in GitHub repo"
            exit 1
          fi
          railway up --ci --service ${{ vars.RAILWAY_SERVICE_NAME || 'suno-api' }}

      - name: Post-deploy health check
        run: |
          URL="${{ vars.RAILWAY_PUBLIC_URL || 'https://suno-api-production-cfc9.up.railway.app' }}"
          echo "Polling $URL/api/health (max 5 minutes)..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 15 "$URL/api/health" || echo "fail")
            if [ "$code" = "200" ]; then
              echo "Health check passed:"
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i: HTTP $code — retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 5 minutes"
          exit 1
